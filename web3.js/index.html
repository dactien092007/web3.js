<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <script src="script.js"></script>
    <title>Bánh mì Sài Gòn</title>
</head>
<body style="background-color: blanchedalmond;">
    <h1 style="background-color: brown">Menu Sài Gòn</h1>
    <div class="mainbox">
        <fieldset class="box1">
            <legend>Foods</legend>
                <table>
                    <tr>
                        <th>Bánh mì</th>
                        <th>Nhỏ</th>
                        <th></th>
                        <th>Lớn</th>
                        <th></th>
                    </tr>
                    <tr>
                        <td>Bánh mì truyền thống:</td>
                        <td>20k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì truyền thống', 'Nhỏ', 20000)">Chọn</button>
                        </td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì truyền thống', 'Lớn', 25000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Bánh mì sốt bơ Đặc biệt:</td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì sốt bơ Đặc biệt', 'Nhỏ', 25000)">Chọn</button>
                        </td>
                        <td>30k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì sốt bơ Đặc biệt', 'Lớn', 30000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Bánh mì thập cẩm:</td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì thập cẩm', 'Nhỏ',  25000)">Chọn</button>
                        </td>
                        <td>30k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì thập cẩm', 'Lớn', 30000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Bánh mì dăm bông xá xíu:</td>
                        <td>20k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì dăm bông xá xíu', 'Nhỏ', 20000)">Chọn</button>
                        </td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Bánh mì dăm bông xá xíu', 'Lớn', 25000)">Chọn</button>
                        </td>
                    </tr>
                </table>
            </fieldset>
        </fieldset>
    
        <fieldset class="box2">
            <legend>Drinks</legend>
                <table>
                    <tr>
                        <th>Nước</th>
                        <th>Nhỏ</th>
                        <th></th>
                        <th>Lớn</th>
                        <th></th>
                    </tr>
                    <tr>
                        <td>Trà đá:</td>
                        <td>7k</td>
                        <td>
                            <button onclick="chonMon('Trà đá', 'Thường', 7000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Trà chanh, trà tắc:</td>
                        <td>15k</td>
                        <td>
                            <button onclick="chonMon('Trà chanh, trà tắc', 'Nhỏ', 15000)">Chọn</button>
                        </td>
                        <td>20k</td>
                        <td>
                            <button onclick="chonMon('Trà chanh, trà tắc', 'Lớn', 20000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Cafe sữa đá:</td>
                        <td>20k</td>
                        <td>
                            <button onclick="chonMon('Cafe sữa đá', 'Nhỏ', 20000)">Chọn</button>
                        </td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Cafe sữa đá', 'Lớn', 25000)">Chọn</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Cafe muối:</td>
                        <td>20k</td>
                        <td>
                            <button onclick="chonMon('Cafe muối', 'Nhỏ', 20000)">Chọn</button>
                        </td>
                        <td>25k</td>
                        <td>
                            <button onclick="chonMon('Cafe muối', 'Lớn', 25000)">Chọn</button>
                        </td>
                    </tr>
                </table>
            </fieldset>
        </fieldset>

    </div>

    <h2>Tổng tiền: <span id="tong">0</span>vnđ</h2>
    <button onclick="datHang()">Đặt hàng</button>
    
</body>
</html>
